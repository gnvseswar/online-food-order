spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Local profile defaults (H2)
spring.datasource.url=${DB_URL:jdbc:h2:file:./fooddb;MODE=MySQL}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
server.port=${PORT:8080}

# Security
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expirationMs=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173}

# Performance and observability
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
server.compression.min-response-size=1024
logging.level.org.springframework.security=INFO
