services:
  - type: web
    name: food-ordering-backend
    runtime: java
    plan: free
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_EXPIRATION_MS
        value: "86400000"
